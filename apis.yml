name: Awardco
kind: company
description: Awardco is an all-in-one employee recognition, rewards, and engagement
  platform built around a global rewards marketplace that includes a native Amazon
  Business integration, gift cards, service awards, and swag. Awardco exposes a
  documented public REST API at https://api.awardco.com/api for administrators and
  integration partners - callers authenticate with a permission-scoped API key
  passed as a request header, all responses are JSON with a success flag, and all
  timestamps are ISO 8601. The API is not open self-serve - it is gated behind an
  Awardco account and the API Key Management permission, and partners additionally
  send an X-Partner-Id header. Documented capabilities cover user provisioning
  (create, import, reset password), recognizing employees and awarding points, and
  retrieving or scheduling reports. Awardco also ships prebuilt HRIS, SSO/SAML,
  Slack, and Microsoft Teams integrations plus Awardco Connect for custom flows.
  Exact request and response schemas for individual methods are not published on
  the open web, so the API surfaces below are modeled from Awardco's public
  documentation and help center rather than a released OpenAPI definition.
